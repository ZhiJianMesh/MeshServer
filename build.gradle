buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'com.guardsquare:proguard-gradle:7.2.2'
    }
}

plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'eclipse'
    id 'application'
    //id 'org.graalvm.buildtools.native' version '0.9.25'
    id 'java'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

eclipse {
    jdt {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
        javaRuntimeName = "jdk"
    }
    classpath {
        file {
            whenMerged { classpath ->
                // 遍历所有依赖条目，为libs目录的JAR关联libsrc的源码
                classpath.entries.each { entry ->
                    // 仅处理libs目录下的JAR（kind为lib，路径以'libs/'开头）
                    if (entry.kind == 'lib' && entry.path.startsWith('libs/')) {
                        // 提取主JAR的文件名（如从'libs/demo.jar'中提取'demo'）
                        def jarFileName = new File(entry.path).name // 结果为'demo.jar'
                        def baseName = jarFileName.replace('.jar', '') // 结果为'demo'
                        
                        // 生成对应源码JAR的路径（libsrc/[baseName]-sources.jar）
                        def sourceJarPath = "libsrc/${baseName}-sources.jar"
                        
                        // 检查源码JAR是否存在于libsrc目录
                        def sourceJarFile = file(sourceJarPath)
                        if (sourceJarFile.exists()) {
                            entry.sourcePath = sourceJarPath // 关联源码
                            println "已关联源码：${entry.path} → ${sourceJarPath}"
                        } else {
                            println "警告：源码JAR不存在 → ${sourceJarPath}"
                        }
                    }
                }
            }
        }
    }
}

group = "cn.net.zhijian.mesh.server"
version = '1.4.0'

ext { //额外属性定义
   prjectName="cn.net.zhijian.mesh.server"
   javaMainClass = "cn.net.zhijian.platform.ServerMain"
}

application {
    mainClass = javaMainClass
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    gradlePluginPortal()
}

dependencies {
    // JUnit 5 BOM 统一版本，不兼容junit4
    testImplementation(platform("org.junit:junit-bom:5.14.0"))
    // JUnit 5 核心 API（含平台基础类）
    testImplementation("org.junit.jupiter:junit-jupiter-api")
    // 不加此依赖，eclipse中默认使用内置的junit，导致加载类失败
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // JUnit 5 运行时引擎
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine")
   
    api fileTree(dir:'libs', include:['*.jar'])
    
    implementation project(':util')
    implementation(project(':fileq')) {
        transitive = false  // 关键：禁用传递依赖
    }
    implementation(project(':quickjs')) {
        transitive = false
    }
}

def cloudPackage = [
    'cn/net/zhijian/mesh/builtin/address/**',
    'cn/net/zhijian/mesh/builtin/appstore/**',
    'cn/net/zhijian/mesh/builtin/company/**',
    'cn/net/zhijian/mesh/builtin/httpdns/**'
]

jar {
    archiveFileName = "${prjectName}-${version}.jar"
    from sourceSets.main.output
    exclude cloudPackage

    manifest {
        attributes(
            'Manifest-Version':"${version}",
            'Main-Class'     : javaMainClass,
            'Built-By'       : System.properties['user.name'],
            'Build-Timestamp': new java.text.SimpleDateFormat("yyyy-MM-dd'T'HH:mm:ss.SSSZ").format(new Date()),
            'Build-Revision' : "${version}",
            'Created-By'     : "Gradle ${gradle.gradleVersion}",
            'Build-Jdk'      : "${System.properties['java.version']} (${System.properties['java.vendor']} ${System.properties['java.vm.version']})",
            'Build-OS'       : "${System.properties['os.name']} ${System.properties['os.arch']} ${System.properties['os.version']}"
        )
    }
}

task cloudjar(type: Jar) {
    archiveFileName = "${prjectName}-cloud-${version}.jar"
    from sourceSets.main.output //不可少这一行
    include cloudPackage
    
    manifest {
        attributes(
            'Manifest-Version':"${version}",
            'Main-Class'     : javaMainClass,
            'Built-By'       : System.properties['user.name'],
            'Build-Timestamp': new java.text.SimpleDateFormat("yyyy-MM-dd'T'HH:mm:ss.SSSZ").format(new Date()),
            'Build-Revision' : "${version}",
            'Created-By'     : "Gradle ${gradle.gradleVersion}",
            'Build-Jdk'      : "${System.properties['java.version']} (${System.properties['java.vendor']} ${System.properties['java.vm.version']})",
            'Build-OS'       : "${System.properties['os.name']} ${System.properties['os.arch']} ${System.properties['os.version']}"
        )
    }
}

task proguard(type:proguard.gradle.ProGuardTask, dependsOn: jar) {
    printmapping "${buildDir}/mapping.txt"
    configuration 'proguard.cfg'
    
    libraryjars "${System.getProperty('java.home')}/jmods/java.base.jmod", jarfilter: '!.jar', filter: '!module-info.class'
    libraryjars "${System.getProperty('java.home')}/jmods/java.sql.jmod", jarfilter: '!.jar', filter: '!module-info.class'
    libraryjars "${System.getProperty('java.home')}/jmods/org.graalvm.truffle.jmod", jarfilter: '!.jar', filter: '!module-info.class'
    libraryjars "${System.getProperty('java.home')}/jmods/org.graalvm.sdk.jmod", jarfilter: '!.jar', filter: '!module-info.class'
    
    libraryjars project.sourceSets.main.compileClasspath

    injars "${buildDir}/libs/${prjectName}-${version}.jar"
    outjars "${buildDir}/libs/${prjectName}-proguard-${version}.jar"
}

test {
    testLogging { //必须写在useJUnitPlatform前面
        events /*"passed",*/ "skipped", "failed", "standardOut", "standardError"
        showStandardStreams = true
        exceptionFormat = "full"
    }
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
