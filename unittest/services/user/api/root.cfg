[
{
    "name": "login",
    "method":"POST",
    "property" : "public",
    "comment":"此请求来自终端,使用用户名密码认证",

    "request": [
        {"name":"grant_type", "type":"string", "must":false, "default":"password", "options":["password"]},
        {"name":"account", "type":"string", "must":true, "regular":"^[a-zA-Z0-9_]{1,30}$"},
        {"name":"password", "type":"string", "must":true, "min":1, "max":100}
    ],

    "process" : [{
        "name" : "login_with_pwd",
        "type" : "static",
        "data":{
            "access_token":"1234567890",
            "refresh_token":"1234567890",
            "expires_at":3720003675932,
            "token_type":"session",
            "id":"12345"
        }
    }],
    
    "onException":{"code":3001,"info":"Invalid json"}
},

{
    "name": "refresh",
    "method":"POST",
    "property" : "private",
    "tokenChecker":"USER",
    "comment":"此请求来自终端,刷新用户token",

    "request": [
        {"name":"grant_type", "type":"string",  "must":false, "default":"refresh_token", "options":["refresh_token"]},
        {"name":"refresh_token", "type":"string", "must":true, "regular":"^[a-zA-Z0-9_\\-]{1,30}$"}
    ],
    
    "process" : [{
        "name" : "refresh_token",
        "type" : "static",
        "data":{
            "access_token":"1234567890",
            "refresh_token":"1234567890",
            "expires_at":3720003675932,
            "token_type":"session",
            "id":"12345"
        }
    }]
},

{
    "name": "serviceToken",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "comment":"此请求来自终端,用user服务的token换取其他服务token，任何用户都可访问，需服务自身控制内部的授权",

    "request": [
        {"name":"service", "type":"string", "must":true,
         "regular":"^[a-zA-Z0-9_:]{1,30}$", "comment":"服务名"},
        {"name":"isCloud", "type":"bool", "must":false, "default":false, "comment":"是否为云侧服务"}
    ],

    "process" : [{
        "name" : "get_service_token",
        "type" : "static",
        "data":{
            "access_token":"1234567890",
            "expires_at":3720003675932,
            "token_type":"session"
        }
    }]
},

{
    "name": "verify",
    "method":"GET",
    "property" : "public",
    "comment":"验证用户的token是否有效。此请求来自被端侧调用服务的服务侧，不是来自端侧",

    "request": [
        {"name":"access_token", "type":"string", "must":true,
         "min":40, "max":1024, "comment":"验证方从终端请求头中获得的access_token"}
    ],

    "process" : [{
        "name" : "verify",
        "type" : "static",
        "data":{"result":0}
    }]
},

{
    "name": "getBaseInfo",
    "method":"GET",
    "property" : "public",
    "feature" : "user",
    "comment":"查询用户自己的基本信息，此请求来自终端,token是用户token",
    
    "process" : [{
        "name" : "base_info",
        "type" : "static",
        "data":{
            "account":"admin",
            "nickName":"管理员",
            "ustatus":"",
            "mobile":"1899999999",
            "email":"l@sina.com",
            "loginTime":"178888888888",
            "createAt":"178888888888",
            "birthday":"178888888",
            "sex":"M",
            "groups":[]
        }
    }]
},

{
    "name": "initialize1",
    "method":"GET",
    "property" : "public",
    "feature" : "user",
    "comment":"初始化",
    
    "process" : [{
        "name" : "init",
        "type" : "static",
        "data":{"result":0}
    }]
},

{
    "name": "ctrl_test",
    "method":"GET",
    "property" : "public",
    "comment":"控制命令测试",
    
    "process" : [{
        "name" : "tran_to_tcp_client",
        "type" : "tcpx"
    }]
},

{
    "name": "nameSpaceTest",
    "method":"GET",
    "property" : "public",
    "comment":"名称空间测试",
    
    "process" : [
        {
            "name" : "ns",
            "type" : "static",
            "nameSpace" : "test",
            "data":{"result":0}
        },
        {"macro":"macro_namespace"},
        {"macro":"macro_call_ns"}
    ]
}

]